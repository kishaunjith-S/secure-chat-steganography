<div class="container">
  <h1>Image Steganography</h1>
  <h3>A secret way of sharing messages</h3>

  <div class="tabs">
    <button class="tablinks" [class.active]="activeTab === 'encode'" (click)="openTab('encode')">
      Encode
    </button>

    <button class="tablinks" [class.active]="activeTab === 'decode'" (click)="openTab('decode')">
      Decode
    </button>
  </div>

  <!-- ================= ENCODE ================= -->

  <div *ngIf="activeTab === 'encode'" class="tab-section">
    <h2>Encode</h2>

    <div class="file-upload">
      <input type="file" id="encodeImageInput" (change)="onEncodeImageSelected($event)" accept="image/*" hidden />
      <label for="encodeImageInput" class="file-label">
        Choose Image
      </label>

      <span class="file-name" *ngIf="selectedEncodeFileName">
        {{ selectedEncodeFileName }}
      </span>
    </div>

    <textarea [(ngModel)]="encodeText" placeholder="Enter text to encode"></textarea>

    <div class="button-group">
      <button (click)="encode()">Encode</button>
      <button class="secondary" (click)="reset('encode')">
        Reset
      </button>
    </div>

    <div class="otp-section" *ngIf="otp">
      <div class="otp-highlight">
        <span class="otp-text">OTP: {{ otp }}</span>
        <button class="copy-button" (click)="copyToClipboard()">
          Copy OTP
        </button>
      </div>
    </div>

    <div *ngIf="encodeSuccess" class="success-message">
      Your message is secure. Share the image and OTP to decrypt.
    </div>
  </div>

  <!-- ================= DECODE ================= -->

  <div *ngIf="activeTab === 'decode'" class="tab-section">
    <h2>Decode</h2>

    <div class="file-upload">
      <input type="file" id="decodeInput" (change)="onDecodeImageSelected($event)" accept="image/*" hidden />
      <label for="decodeInput" class="file-label">
        Choose Image
      </label>

      <span class="file-name" *ngIf="selectedDecodeFileName">
        {{ selectedDecodeFileName }}
      </span>
    </div>

    <div class="button-group">
      <button (click)="decode()">Decode</button>
      <button class="secondary" (click)="reset('decode')">
        Reset
      </button>
    </div>

    <div *ngIf="decodeSuccess" class="success-message">
      Decoding successful.
    </div>

    <div *ngIf="decodedText" class="result">
      <h3>Decoded Text:</h3>
      <p>{{ decodedText }}</p>
    </div>
  </div>
</div>
